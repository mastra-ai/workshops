<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    .section h2 {
      margin-bottom: 1rem;
    }
    .section h3 {
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    .section ul, .section ol {
      margin: 1rem 0;

  <!-- NAV_PLACEHOLDER: organizer will inject topnav here -->
  <div class="page">
    <div class="main">
      <div class="section fade-on-scroll" id="all-transformers-callouts">
        <h2>Callouts</h2>
<p>A slide with two callouts to verify color variants coexist.</p>
<div class="callout fade-on-scroll">
  <p>Default accent callout — baseline.</p>
</div>
<div class="callout callout-green fade-on-scroll">
  <p>Positive callout.</p>
</div>
<div class="callout callout-yellow fade-on-scroll">
  <p>Warning callout.</p>
</div>
<div class="callout callout-orange fade-on-scroll">

</div>
