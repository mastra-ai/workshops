<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser & Channels Workshop — open-slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --card: #16161e; --text: #e0e0e0; --muted: #a0a0a0;
            --accent: #6366f1; --border: rgba(255,255,255,0.08);
            --font: 'Inter', system-ui, sans-serif;
            --mono: 'Fira Code', ui-monospace, monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .wrap { max-width: 640px; }
        .badge { display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(99,102,241,0.3); padding: 0.2rem 0.6rem; border-radius: 999px; margin-bottom: 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: var(--muted); margin-bottom: 1rem; line-height: 1.6; }
        pre { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; font-family: var(--mono); font-size: 0.9rem; color: var(--text); margin: 0.5rem 0 1.5rem; overflow-x: auto; }
        a { color: var(--accent); }
        .meta { font-size: 0.85rem; color: var(--muted); margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="badge">open-slide deck</span>
        <h1>Browser &amp; Channels Workshop</h1>
        <p>21 slides. Run the open-slide dev server to present:</p>
<pre>cd decks/browser-channels-workshop
pnpm install
pnpm dev</pre>
        <p>Then open <a href="http://localhost:5173/s/mastra-browser-channels">http://localhost:5173/s/mastra-browser-channels</a>. Press <strong>F</strong> for fullscreen, arrow keys to navigate.</p>
        <div class="meta">
            ← <a href="../../index.html">Back to all decks</a>
        </div>
    </div>
</body>
</html>
